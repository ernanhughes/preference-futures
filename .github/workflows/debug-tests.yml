name: debug-tests

on:
  pull_request:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Clone, install and expose first failure
        env:
          BRANCH: ${{ github.head_ref }}
          REPOSITORY: ${{ github.repository }}
        run: |
          git clone -q --depth 1 --branch "$BRANCH" "https://github.com/$REPOSITORY.git" repo
          cd repo
          python3 -m pip install -q -e ".[dev]"
          pytest -x -q
