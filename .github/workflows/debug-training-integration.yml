name: debug-training-integration

on:
  pull_request:

jobs:
  tiny-model-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install model stack
        run: python -m pip install -q -e ".[dev,train]"
      - name: Train and verify all six tiny-model objectives
        env:
          RUN_TRAINING_INTEGRATION: "1"
        run: pytest -q tests/test_training_runtime_integration.py
